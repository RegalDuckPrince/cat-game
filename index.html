<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity Feline</title>
  <style>
    /* ── Blueprint design system ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #07111f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 12px 8px 24px;
      font-family: 'Courier New', Courier, monospace;
      color: #7ebdd4;
      user-select: none;
    }

    h1 {
      font-size: 22px;
      color: #a8d8ea;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    #subtitle {
      font-size: 11px;
      color: #3a7aa8;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    #level-display {
      font-size: 13px;
      color: #4a9fd4;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }

    #status-bar {
      font-size: 13px;
      color: #ffd700;
      min-height: 18px;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    #game-container { position: relative; }

    canvas {
      display: block;
      border: 1px solid #1a3a5c;
      cursor: crosshair;
    }

    /* ── Tool bar ─────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tool-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .tool-label {
      font-size: 10px;
      color: #3a7aa8;
      letter-spacing: 1px;
    }

    button {
      background: #0b1e33;
      color: #7ebdd4;
      border: 1px solid #1a4a7a;
      padding: 7px 14px;
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    button:hover  { background: #153049; color: #a8d8ea; border-color: #2a6a9a; }
    button:active { background: #1e4060; }

    button.active {
      background: #0d3060;
      color: #ffffff;
      border-color: #4a9fd4;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #divider { width: 1px; height: 34px; background: #1a3a5c; align-self: center; }

    /* ── Legend ───────────────────────────────────────────────── */
    #legend {
      margin-top: 10px;
      display: flex;
      gap: 16px;
      font-size: 10px;
      color: #3a7aa8;
      flex-wrap: wrap;
      justify-content: center;
    }

    .legend-item { display: flex; align-items: center; gap: 4px; }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>Gravity Feline</h1>
  <div id="subtitle">A Physics Puzzle</div>
  <div id="level-display">LEVEL 1</div>
  <div id="status-bar">Place objects, then press PLAY</div>

  <div id="game-container">
    <canvas id="canvas" width="800" height="530"></canvas>
  </div>

  <div id="toolbar">
    <!-- Placeable objects -->
    <div class="tool-group">
      <span class="tool-label" id="count-bouncer">×3</span>
      <button id="btn-bouncer" onclick="selectTool('bouncer')">⊙ Bouncer</button>
    </div>
    <div class="tool-group">
      <span class="tool-label" id="count-well">×2</span>
      <button id="btn-well" onclick="selectTool('well')">⊛ Gravity Well</button>
    </div>
    <div class="tool-group">
      <span class="tool-label" id="count-plank">×3</span>
      <button id="btn-plank" onclick="selectTool('plank')">— Plank</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">&nbsp;</span>
      <button id="btn-remove" onclick="selectTool('remove')">✕ Remove</button>
    </div>

    <div id="divider"></div>

    <!-- Actions -->
    <div class="tool-group">
      <span class="tool-label">&nbsp;</span>
      <button id="btn-play" onclick="handlePlayPause()">▶ Play</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">&nbsp;</span>
      <button id="btn-reset" onclick="resetLevel()">↺ Reset</button>
    </div>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ffd700;border:1px solid #ffaa00"></div>Cat</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(0,229,255,.3);border:1px solid #00e5ff"></div>Bouncer</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(180,79,255,.3);border:1px solid #b44fff"></div>Gravity Well</div>
    <div class="legend-item"><div class="legend-dot" style="width:18px;height:4px;border-radius:2px;background:#78c878"></div>Plank</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(231,76,60,.4);border:1px solid #e74c3c"></div>Spike</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(255,215,0,.15);border:1px solid #ffd700"></div>Goal Basket</div>
  </div>

  <script>
    // =============================================================
    //  GRAVITY FELINE  –  Physics puzzle (Blueprint edition)
    //  Single-file HTML5 / Canvas game.
    //
    //  Physics model:
    //   • Semi-implicit Euler integration
    //   • Circle ↔ line-segment & circle ↔ circle collision
    //   • Gravity wells apply radial attraction force
    //   • Bouncers add a reflected impulse on contact
    //   • Planks are static line segments the cat slides on
    // =============================================================

    // ── Canvas setup ─────────────────────────────────────────────
    /** @type {HTMLCanvasElement} */
    const canvas = document.getElementById('canvas');
    /** @type {CanvasRenderingContext2D} */
    const ctx    = canvas.getContext('2d');
    const W = canvas.width;   // 800
    const H = canvas.height;  // 530

    // ── Physics constants ────────────────────────────────────────
    const GRAVITY       = 0.38;   // feels slightly heavy / clumsy
    const AIR_DAMPING   = 0.995;  // gentle air resistance
    const WALL_RESTITUTION = 0.35;// how bouncy level walls are
    const BOUNCER_IMPULSE  = 14;  // m/s added away from bouncer centre
    const WELL_STRENGTH    = 0.18;// force magnitude at centre
    const WELL_RADIUS      = 90;  // pixel radius of influence

    // ── Game state ───────────────────────────────────────────────
    /**
     * @typedef {'building'|'playing'|'won'|'dead'} Phase
     * @type {Phase}
     */
    let phase         = 'building';
    let currentLevel  = Math.min(Math.max(parseInt(localStorage.getItem('gf_level') || '1'), 1), 2);

    /** @type {'bouncer'|'well'|'plank'|'remove'} */
    let selectedTool  = 'bouncer';

    // Mouse position (canvas-relative)
    let mouseX = 0, mouseY = 0;

    // First-click cache for two-click plank placement
    /** @type {{x:number,y:number}|null} */
    let plankAnchor = null;

    // ── Placed objects (player-placed, reset on Reset) ───────────
    /**
     * @typedef {{x:number, y:number, r:number}} Bouncer
     * @typedef {{x:number, y:number}}            GravWell
     * @typedef {{x1:number,y1:number,x2:number,y2:number}} Seg
     */
    /** @type {Bouncer[]}  */ let bouncers = [];
    /** @type {GravWell[]} */ let wells    = [];
    /** @type {Seg[]}      */ let planks   = [];

    // Inventory counts for current attempt
    let inv = { bouncer: 3, well: 2, plank: 3 };

    // ── Cat physics body ─────────────────────────────────────────
    const cat = { x: 0, y: 0, vx: 0, vy: 0, r: 16 };

    // ── Particle effects ─────────────────────────────────────────
    /**
     * @typedef {{x:number,y:number,vx:number,vy:number,life:number,maxLife:number,color:string}} Particle
     * @type {Particle[]}
     */
    let particles = [];

    // ── Level definitions ────────────────────────────────────────
    /**
     * @typedef {{
     *   startPipe : {x:number,y:number,w:number,h:number},
     *   basket    : {x:number,y:number,w:number,h:number},
     *   walls     : Seg[],
     *   spikes    : {x:number,y:number,w:number}[],
     *   inventory : {bouncer:number,well:number,plank:number},
     *   hint      : string
     * }} LevelDef
     * @type {Record<number, LevelDef>}
     */
    const LEVELS = {
      1: {
        startPipe : { x: 40,  y: 50,  w: 50, h: 90 },
        basket    : { x: 686, y: 390, w: 64, h: 50 },
        walls: [
          // floor
          { x1: 0,   y1: 520, x2: 800, y2: 520 },
          // left & right
          { x1: 0,   y1: 0,   x2: 0,   y2: 530 },
          { x1: 800, y1: 0,   x2: 800, y2: 530 },
          // built-in platforms
          { x1: 160, y1: 210, x2: 320, y2: 210 },
          { x1: 420, y1: 300, x2: 580, y2: 300 },
        ],
        spikes: [
          { x: 310, y: 508, w: 100 },
        ],
        inventory: { bouncer: 3, well: 2, plank: 3 },
        hint: 'Guide the cat into the golden basket!'
      },
      2: {
        startPipe : { x: 40,  y: 50,  w: 50, h: 90 },
        basket    : { x: 686, y: 80,  w: 64, h: 50 },
        walls: [
          { x1: 0,   y1: 520, x2: 800, y2: 520 },
          { x1: 0,   y1: 0,   x2: 0,   y2: 530 },
          { x1: 800, y1: 0,   x2: 800, y2: 530 },
          // stepped platforms
          { x1: 150, y1: 180, x2: 280, y2: 180 },
          { x1: 340, y1: 260, x2: 470, y2: 260 },
          { x1: 530, y1: 180, x2: 660, y2: 180 },
          { x1: 200, y1: 360, x2: 400, y2: 360 },
          { x1: 480, y1: 400, x2: 700, y2: 400 },
        ],
        spikes: [
          { x: 220, y: 508, w: 120 },
          { x: 430, y: 508, w:  80 },
        ],
        inventory: { bouncer: 3, well: 3, plank: 2 },
        hint: 'The basket is up high – use bouncers wisely!'
      }
    };

    // ── Helpers ──────────────────────────────────────────────────
    /**
     * Euclidean distance between two points.
     * @param {number} ax @param {number} ay @param {number} bx @param {number} by
     * @returns {number}
     */
    function dist(ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      return Math.sqrt(dx * dx + dy * dy);
    }

    /**
     * Shortest distance from point P to segment AB.
     * @param {number} px @param {number} py
     * @param {number} ax @param {number} ay @param {number} bx @param {number} by
     * @returns {number}
     */
    function distToSeg(px, py, ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      const lenSq = dx * dx + dy * dy;
      if (lenSq === 0) return dist(px, py, ax, ay);
      let t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
      t = Math.max(0, Math.min(1, t));
      return dist(px, py, ax + t * dx, ay + t * dy);
    }

    /**
     * Circle vs infinite-line-segment collision.
     * Returns null if no overlap, otherwise { nx, ny, overlap }.
     * @param {number} cx @param {number} cy @param {number} cr
     * @param {number} ax @param {number} ay @param {number} bx @param {number} by
     * @returns {{nx:number,ny:number,overlap:number}|null}
     */
    function circleSegCollide(cx, cy, cr, ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      const lenSq = dx * dx + dy * dy;
      if (lenSq < 0.0001) return null;

      let t = ((cx - ax) * dx + (cy - ay) * dy) / lenSq;
      t = Math.max(0, Math.min(1, t));

      const closestX = ax + t * dx;
      const closestY = ay + t * dy;
      const d = dist(cx, cy, closestX, closestY);

      if (d < cr && d > 0.0001) {
        return {
          nx     : (cx - closestX) / d,
          ny     : (cy - closestY) / d,
          overlap: cr - d
        };
      }
      if (d <= 0.0001) {
        // Cat is exactly on the segment – push upward
        return { nx: 0, ny: -1, overlap: cr };
      }
      return null;
    }

    // ── Particle emitter ─────────────────────────────────────────
    /**
     * Emit a burst of particles at (x, y).
     * @param {number} x @param {number} y @param {string} color @param {number} n
     */
    function emitParticles(x, y, color, n) {
      for (let i = 0; i < n; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3.5;
        particles.push({
          x, y,
          vx   : Math.cos(angle) * speed,
          vy   : Math.sin(angle) * speed,
          life : 1,
          maxLife: 1,
          color
        });
      }
    }

    // ── Level init ───────────────────────────────────────────────
    /** @param {number} lvlNum */
    function initLevel(lvlNum) {
      const lvl = LEVELS[lvlNum];
      if (!lvl) return;

      // Place cat just below the start pipe's opening
      const sp = lvl.startPipe;
      cat.x  = sp.x + sp.w / 2;
      cat.y  = sp.y + sp.h - cat.r - 2;
      cat.vx = 0;
      cat.vy = 0;

      inv = { ...lvl.inventory };
      particles = [];
      updateInventoryUI();

      document.getElementById('level-display').textContent = `LEVEL ${lvlNum}`;
      setStatus(lvl.hint, '#4a9fd4');
    }

    function resetLevel() {
      phase       = 'building';
      bouncers    = [];
      wells       = [];
      planks      = [];
      plankAnchor = null;
      initLevel(currentLevel);
      updatePlayBtn();
    }

    // ── UI helpers ───────────────────────────────────────────────
    /**
     * @param {string} msg
     * @param {string} [color='#ffd700']
     */
    function setStatus(msg, color) {
      const el = document.getElementById('status-bar');
      el.textContent = msg;
      el.style.color = color || '#ffd700';
    }

    function updateInventoryUI() {
      document.getElementById('count-bouncer').textContent = `×${inv.bouncer}`;
      document.getElementById('count-well').textContent    = `×${inv.well}`;
      document.getElementById('count-plank').textContent   = `×${inv.plank}`;

      document.getElementById('btn-bouncer').disabled = inv.bouncer <= 0 && selectedTool !== 'bouncer';
      document.getElementById('btn-well').disabled    = inv.well    <= 0 && selectedTool !== 'well';
      document.getElementById('btn-plank').disabled   = inv.plank   <= 0 && selectedTool !== 'plank';
    }

    function updatePlayBtn() {
      const btn = document.getElementById('btn-play');
      if (phase === 'playing') {
        btn.textContent = '⏸ Pause';
        btn.classList.add('active');
      } else {
        btn.textContent = '▶ Play';
        btn.classList.remove('active');
      }
    }

    /** @param {string} tool */
    function selectTool(tool) {
      if (phase !== 'building') return;
      selectedTool = tool;
      plankAnchor  = null;
      ['bouncer', 'well', 'plank', 'remove'].forEach(t => {
        document.getElementById(`btn-${t}`).classList.toggle('active', t === tool);
      });
      if (tool === 'plank') {
        setStatus('Click two points to place a plank', '#78c878');
      } else {
        setStatus(LEVELS[currentLevel].hint, '#4a9fd4');
      }
    }

    function handlePlayPause() {
      if (phase === 'won' || phase === 'dead') {
        resetLevel();
        return;
      }
      if (phase === 'building') {
        phase = 'playing';
        setStatus('', '#ffd700');
      } else if (phase === 'playing') {
        // Pause → back to building
        phase = 'building';
        initLevel(currentLevel);  // reset cat position
        setStatus(LEVELS[currentLevel].hint, '#4a9fd4');
      }
      updatePlayBtn();
    }

    // ── Canvas input ─────────────────────────────────────────────
    canvas.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      mouseX = e.clientX - r.left;
      mouseY = e.clientY - r.top;
    });

    canvas.addEventListener('click', e => {
      if (phase !== 'building') return;
      const r  = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left;
      const my = e.clientY - r.top;

      if (selectedTool === 'remove') { removeAt(mx, my); return; }

      if (selectedTool === 'bouncer' && inv.bouncer > 0) {
        bouncers.push({ x: mx, y: my, r: 22 });
        inv.bouncer--;
        updateInventoryUI();
        return;
      }

      if (selectedTool === 'well' && inv.well > 0) {
        wells.push({ x: mx, y: my });
        inv.well--;
        updateInventoryUI();
        return;
      }

      if (selectedTool === 'plank') {
        if (!plankAnchor) {
          plankAnchor = { x: mx, y: my };
          setStatus('Now click a second point to finish the plank', '#78c878');
        } else {
          if (inv.plank > 0) {
            planks.push({ x1: plankAnchor.x, y1: plankAnchor.y, x2: mx, y2: my });
            inv.plank--;
            updateInventoryUI();
          }
          plankAnchor = null;
          setStatus(LEVELS[currentLevel].hint, '#4a9fd4');
        }
      }
    });

    canvas.addEventListener('contextmenu', e => {
      e.preventDefault();
      if (phase !== 'building') return;
      const r = canvas.getBoundingClientRect();
      removeAt(e.clientX - r.left, e.clientY - r.top);
    });

    /** Remove the closest placed object near (mx, my). */
    function removeAt(mx, my) {
      // Bouncers
      for (let i = bouncers.length - 1; i >= 0; i--) {
        if (dist(mx, my, bouncers[i].x, bouncers[i].y) < bouncers[i].r + 8) {
          bouncers.splice(i, 1);
          inv.bouncer++;
          updateInventoryUI();
          return;
        }
      }
      // Wells
      for (let i = wells.length - 1; i >= 0; i--) {
        if (dist(mx, my, wells[i].x, wells[i].y) < 20) {
          wells.splice(i, 1);
          inv.well++;
          updateInventoryUI();
          return;
        }
      }
      // Planks
      for (let i = planks.length - 1; i >= 0; i--) {
        const p = planks[i];
        if (distToSeg(mx, my, p.x1, p.y1, p.x2, p.y2) < 14) {
          planks.splice(i, 1);
          inv.plank++;
          updateInventoryUI();
          return;
        }
      }
    }

    // ── Physics update ───────────────────────────────────────────
    function updatePhysics() {
      if (phase !== 'playing') return;

      const lvl = LEVELS[currentLevel];

      // 1. Gravity
      cat.vy += GRAVITY;

      // 2. Gravity well attraction
      for (const w of wells) {
        const dx = w.x - cat.x;
        const dy = w.y - cat.y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < WELL_RADIUS && d > 0.001) {
          const factor = WELL_STRENGTH * (1 - d / WELL_RADIUS);
          cat.vx += (dx / d) * factor;
          cat.vy += (dy / d) * factor;
        }
      }

      // 3. Air damping
      cat.vx *= AIR_DAMPING;
      cat.vy *= AIR_DAMPING;

      // 4. Integrate position
      cat.x += cat.vx;
      cat.y += cat.vy;

      // 5. Collide with level walls + player planks
      const allWalls = [...lvl.walls, ...planks];
      for (const seg of allWalls) {
        const hit = circleSegCollide(cat.x, cat.y, cat.r, seg.x1, seg.y1, seg.x2, seg.y2);
        if (hit) {
          // Separate
          cat.x += hit.nx * hit.overlap;
          cat.y += hit.ny * hit.overlap;
          // Reflect with restitution
          const vDotN = cat.vx * hit.nx + cat.vy * hit.ny;
          if (vDotN < 0) {
            cat.vx -= (1 + WALL_RESTITUTION) * vDotN * hit.nx;
            cat.vy -= (1 + WALL_RESTITUTION) * vDotN * hit.ny;
          }
        }
      }

      // 6. Collide with bouncers
      for (const b of bouncers) {
        const d = dist(cat.x, cat.y, b.x, b.y);
        const minD = cat.r + b.r;
        if (d < minD && d > 0.001) {
          const nx = (cat.x - b.x) / d;
          const ny = (cat.y - b.y) / d;

          // Separate
          const overlap = minD - d;
          cat.x += nx * overlap;
          cat.y += ny * overlap;

          // Reflect + boost: preserve tangential velocity, ramp up normal
          const vDotN   = cat.vx * nx + cat.vy * ny;
          const tangentX = cat.vx - vDotN * nx;
          const tangentY = cat.vy - vDotN * ny;
          const newNormalSpeed = Math.max(Math.abs(vDotN), BOUNCER_IMPULSE * 0.6) + BOUNCER_IMPULSE * 0.5;

          cat.vx = tangentX + nx * newNormalSpeed;
          cat.vy = tangentY + ny * newNormalSpeed;

          emitParticles(b.x + nx * b.r, b.y + ny * b.r, '#00e5ff', 10);
        }
      }

      // 7. Basket walls (U-shape collision)
      const bk = lvl.basket;
      const basketSegs = [
        { x1: bk.x,        y1: bk.y,        x2: bk.x,        y2: bk.y + bk.h },  // left
        { x1: bk.x + bk.w, y1: bk.y,        x2: bk.x + bk.w, y2: bk.y + bk.h },  // right
        { x1: bk.x,        y1: bk.y + bk.h, x2: bk.x + bk.w, y2: bk.y + bk.h },  // bottom
      ];
      for (const seg of basketSegs) {
        const hit = circleSegCollide(cat.x, cat.y, cat.r, seg.x1, seg.y1, seg.x2, seg.y2);
        if (hit) {
          cat.x += hit.nx * hit.overlap;
          cat.y += hit.ny * hit.overlap;
          const vDotN = cat.vx * hit.nx + cat.vy * hit.ny;
          if (vDotN < 0) {
            cat.vx -= (1 + WALL_RESTITUTION) * vDotN * hit.nx;
            cat.vy -= (1 + WALL_RESTITUTION) * vDotN * hit.ny;
          }
        }
      }

      // 8. Spike collision (instant death)
      for (const spike of lvl.spikes) {
        // Spikes are drawn from spike.y upward by ~20px with width spike.w
        if (cat.x + cat.r > spike.x &&
            cat.x - cat.r < spike.x + spike.w &&
            cat.y + cat.r > spike.y - 20) {
          triggerDeath();
          return;
        }
      }

      // 9. Fall off-screen
      if (cat.y - cat.r > H + 40 || cat.x + cat.r < -40 || cat.x - cat.r > W + 40) {
        triggerDeath();
        return;
      }

      // 10. Win condition: cat rests inside the basket
      const inBasketX = cat.x > bk.x + cat.r       && cat.x < bk.x + bk.w - cat.r;
      const inBasketY = cat.y + cat.r > bk.y + 10   && cat.y + cat.r < bk.y + bk.h + 20;
      const speed     = Math.sqrt(cat.vx ** 2 + cat.vy ** 2);

      if (inBasketX && inBasketY && speed < 6) {
        triggerWin();
      }

      // 11. Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x   += p.vx;
        p.y   += p.vy;
        p.vy  += 0.08;
        p.life -= 0.03;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function triggerDeath() {
      phase = 'dead';
      emitParticles(cat.x, cat.y, '#e74c3c', 18);
      setStatus('😿  The cat missed! Press PLAY or RESET to try again.', '#e74c3c');
      updatePlayBtn();
    }

    function triggerWin() {
      phase = 'won';
      emitParticles(cat.x, cat.y, '#ffd700', 24);
      const lvl = LEVELS[currentLevel];

      if (currentLevel < Object.keys(LEVELS).length) {
        setStatus(`🎉  Purrfect! Unlocking Level ${currentLevel + 1}…`, '#ffd700');
        localStorage.setItem('gf_level', String(currentLevel + 1));
        setTimeout(() => {
          currentLevel++;
          resetLevel();
        }, 2200);
      } else {
        setStatus('🏆  You beat all levels!  Congratulations, champion!', '#ffd700');
        localStorage.setItem('gf_level', '1');
      }
      updatePlayBtn();
    }

    // ── Drawing ───────────────────────────────────────────────────
    function drawGrid() {
      const GRID = 30;
      ctx.strokeStyle = 'rgba(26,74,122,0.35)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= W; x += GRID) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y <= H; y += GRID) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
    }

    /** @param {Seg} seg @param {string} color @param {number} lw */
    function drawSeg(seg, color, lw) {
      ctx.strokeStyle = color;
      ctx.lineWidth   = lw;
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
    }

    /** @param {{x:number,y:number,w:number,h:number}} sp */
    function drawStartPipe(sp) {
      ctx.fillStyle   = 'rgba(74,159,212,0.12)';
      ctx.strokeStyle = '#2a6a9a';
      ctx.lineWidth   = 2;
      ctx.fillRect(sp.x, sp.y, sp.w, sp.h);
      ctx.strokeRect(sp.x, sp.y, sp.w, sp.h);

      // Pipe top
      ctx.fillStyle   = '#1a4a7a';
      ctx.fillRect(sp.x - 6, sp.y - 10, sp.w + 12, 12);
      ctx.strokeRect(sp.x - 6, sp.y - 10, sp.w + 12, 12);

      ctx.fillStyle   = '#4a9fd4';
      ctx.font        = 'bold 10px Courier New';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('START', sp.x + sp.w / 2, sp.y + sp.h / 2);
    }

    /** @param {{x:number,y:number,w:number,h:number}} bk */
    function drawBasket(bk) {
      // Filled region
      ctx.fillStyle = 'rgba(255,215,0,0.1)';
      ctx.fillRect(bk.x, bk.y, bk.w, bk.h);

      // U-shape
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth   = 3;
      ctx.lineJoin    = 'round';
      ctx.beginPath();
      ctx.moveTo(bk.x,        bk.y);
      ctx.lineTo(bk.x,        bk.y + bk.h);
      ctx.lineTo(bk.x + bk.w, bk.y + bk.h);
      ctx.lineTo(bk.x + bk.w, bk.y);
      ctx.stroke();

      // Glowing label
      ctx.fillStyle    = '#ffd700';
      ctx.font         = 'bold 10px Courier New';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('END', bk.x + bk.w / 2, bk.y + bk.h / 2);
    }

    /** @param {{x:number,y:number,w:number}} spike */
    function drawSpikes(spike) {
      const SW    = 14;
      const SH    = 20;
      const count = Math.floor(spike.w / SW);

      ctx.fillStyle   = '#c0392b';
      ctx.strokeStyle = '#e74c3c';
      ctx.lineWidth   = 1;

      for (let i = 0; i < count; i++) {
        const sx = spike.x + i * SW;
        const sy = spike.y;
        ctx.beginPath();
        ctx.moveTo(sx,           sy);
        ctx.lineTo(sx + SW / 2,  sy - SH);
        ctx.lineTo(sx + SW,      sy);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
    }

    function drawCat() {
      const { x, y, r } = cat;

      // Speed-based wobble (gives clumsy feel)
      const speed   = Math.sqrt(cat.vx ** 2 + cat.vy ** 2);
      const squishX = 1 + (cat.vy > 0 ? 0.08 : -0.05) * Math.min(speed / 10, 1);
      const squishY = 1 / squishX;

      ctx.save();
      ctx.translate(x, y);
      ctx.scale(squishX, squishY);

      // Body glow
      const grd = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r);
      grd.addColorStop(0, '#ffe066');
      grd.addColorStop(1, '#e6a000');
      ctx.fillStyle   = grd;
      ctx.strokeStyle = '#cc8800';
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Ears
      const earDraw = (ex, ey, tip) => {
        ctx.fillStyle   = '#f5c000';
        ctx.strokeStyle = '#cc8800';
        ctx.lineWidth   = 1.5;
        ctx.beginPath();
        ctx.moveTo(ex,      ey);
        ctx.lineTo(tip.x,   tip.y);
        ctx.lineTo(ex + (tip.x > 0 ? -r * 0.35 : r * 0.35), ey);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      };
      earDraw(-r * 0.45, -r * 0.7, { x: -r * 0.75, y: -r * 1.25 });
      earDraw( r * 0.45, -r * 0.7, { x:  r * 0.75, y: -r * 1.25 });

      // Inner ear tint
      ctx.fillStyle = 'rgba(255,100,120,0.5)';
      ctx.beginPath();
      ctx.moveTo(-r * 0.45, -r * 0.7);
      ctx.lineTo(-r * 0.7,  -r * 1.1);
      ctx.lineTo(-r * 0.2,  -r * 0.8);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo( r * 0.45, -r * 0.7);
      ctx.lineTo( r * 0.7,  -r * 1.1);
      ctx.lineTo( r * 0.2,  -r * 0.8);
      ctx.closePath();
      ctx.fill();

      // Eyes
      ctx.fillStyle = '#1a0a00';
      ctx.beginPath();
      ctx.ellipse(-r * 0.3, -r * 0.18, r * 0.14, r * 0.18, 0, 0, Math.PI * 2);
      ctx.ellipse( r * 0.3, -r * 0.18, r * 0.14, r * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();

      // Eye shine
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.arc(-r * 0.25, -r * 0.24, r * 0.05, 0, Math.PI * 2);
      ctx.arc( r * 0.35, -r * 0.24, r * 0.05, 0, Math.PI * 2);
      ctx.fill();

      // Nose
      ctx.fillStyle = '#ff6b8a';
      ctx.beginPath();
      ctx.arc(0, r * 0.07, r * 0.1, 0, Math.PI * 2);
      ctx.fill();

      // Mouth
      ctx.strokeStyle = '#cc5500';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(-r * 0.15, r * 0.18);
      ctx.quadraticCurveTo(-r * 0.3, r * 0.3, -r * 0.4, r * 0.22);
      ctx.moveTo( r * 0.15, r * 0.18);
      ctx.quadraticCurveTo( r * 0.3, r * 0.3,  r * 0.4, r * 0.22);
      ctx.stroke();

      // Whiskers
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth   = 0.8;
      [[-1, -2], [-1, 2], [-1, 6]].forEach(([ox, oy]) => {
        ctx.beginPath();
        ctx.moveTo(-r * 0.1, r * 0.07 + oy);
        ctx.lineTo(-r * 1.1, r * 0.07 + oy + ox);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo( r * 0.1, r * 0.07 + oy);
        ctx.lineTo( r * 1.1, r * 0.07 + oy - ox);
        ctx.stroke();
      });

      ctx.restore();

      // Velocity arrow (subtle) during play
      if (phase === 'playing' && speed > 1.5) {
        const norm = Math.min(speed, 16) / 16;
        ctx.strokeStyle = `rgba(255,215,0,${0.25 + norm * 0.4})`;
        ctx.lineWidth   = 1.5;
        const arrowLen  = 18 + norm * 20;
        const angle     = Math.atan2(cat.vy, cat.vx);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(angle) * arrowLen, y + Math.sin(angle) * arrowLen);
        ctx.stroke();
      }
    }

    /** @param {Bouncer} b */
    function drawBouncer(b) {
      // Outer ring
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth   = 2;
      ctx.fillStyle   = 'rgba(0,229,255,0.12)';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Inner ring
      ctx.strokeStyle = 'rgba(0,229,255,0.5)';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r * 0.55, 0, Math.PI * 2);
      ctx.stroke();

      // Cross hairs
      ctx.strokeStyle = 'rgba(0,229,255,0.4)';
      ctx.lineWidth   = 0.8;
      ctx.beginPath();
      ctx.moveTo(b.x - b.r, b.y); ctx.lineTo(b.x + b.r, b.y);
      ctx.moveTo(b.x, b.y - b.r); ctx.lineTo(b.x, b.y + b.r);
      ctx.stroke();

      ctx.fillStyle    = '#00e5ff';
      ctx.font         = 'bold 9px Courier New';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('B', b.x, b.y);
    }

    /** @param {GravWell} w */
    function drawWell(w) {
      // Influence radius (faint)
      for (let ring = WELL_RADIUS; ring > 0; ring -= 22) {
        const alpha = 0.08 + (WELL_RADIUS - ring) / WELL_RADIUS * 0.25;
        ctx.strokeStyle = `rgba(180,79,255,${alpha})`;
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.arc(w.x, w.y, ring, 0, Math.PI * 2);
        ctx.stroke();
      }
      // Core
      const grd = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, 12);
      grd.addColorStop(0, 'rgba(200,120,255,0.9)');
      grd.addColorStop(1, 'rgba(180,79,255,0.2)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(w.x, w.y, 12, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle    = '#ffffff';
      ctx.font         = 'bold 8px Courier New';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('G', w.x, w.y);
    }

    /** @param {Seg} p */
    function drawPlank(p) {
      ctx.strokeStyle = '#78c878';
      ctx.lineWidth   = 5;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(p.x1, p.y1);
      ctx.lineTo(p.x2, p.y2);
      ctx.stroke();

      // Dotted overlay for blueprint look
      ctx.strokeStyle = 'rgba(180,255,180,0.3)';
      ctx.lineWidth   = 1;
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(p.x1, p.y1);
      ctx.lineTo(p.x2, p.y2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.lineCap = 'butt';
    }

    /** Draw a ghost preview while the player is hovering before placing. */
    function drawPreview() {
      if (phase !== 'building') return;
      ctx.globalAlpha = 0.5;

      if (selectedTool === 'bouncer' && inv.bouncer > 0) {
        ctx.strokeStyle = '#00e5ff';
        ctx.fillStyle   = 'rgba(0,229,255,0.1)';
        ctx.lineWidth   = 2;
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 22, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      } else if (selectedTool === 'well' && inv.well > 0) {
        ctx.strokeStyle = '#b44fff';
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, WELL_RADIUS, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = '#b44fff';
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 12, 0, Math.PI * 2);
        ctx.fill();
      } else if (selectedTool === 'plank') {
        if (plankAnchor) {
          // Show line from anchor to cursor
          ctx.strokeStyle = '#78c878';
          ctx.lineWidth   = 5;
          ctx.lineCap     = 'round';
          ctx.beginPath();
          ctx.moveTo(plankAnchor.x, plankAnchor.y);
          ctx.lineTo(mouseX, mouseY);
          ctx.stroke();
          ctx.lineCap = 'butt';

          // Anchor dot
          ctx.fillStyle = '#78c878';
          ctx.beginPath();
          ctx.arc(plankAnchor.x, plankAnchor.y, 5, 0, Math.PI * 2);
          ctx.fill();
        } else if (inv.plank > 0) {
          ctx.fillStyle = '#78c878';
          ctx.beginPath();
          ctx.arc(mouseX, mouseY, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.globalAlpha = 1;
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3 * alpha, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawHUD() {
      // Phase badge
      const phaseColor  = { building: '#4a9fd4', playing: '#00ff88', won: '#ffd700', dead: '#e74c3c' };
      const phaseLabel  = { building: 'BUILD', playing: 'PLAY', won: '★ WIN', dead: '✕ FAIL' };
      ctx.fillStyle     = phaseColor[phase] || '#4a9fd4';
      ctx.font          = 'bold 11px Courier New';
      ctx.textAlign     = 'left';
      ctx.textBaseline  = 'top';
      ctx.fillText(`[ ${phaseLabel[phase] || phase.toUpperCase()} ]`, 10, 8);

      // Speed-o-meter during play
      if (phase === 'playing') {
        const speed   = Math.sqrt(cat.vx ** 2 + cat.vy ** 2);
        const speedStr = `SPD:${speed.toFixed(1)}`;
        ctx.fillStyle  = 'rgba(74,159,212,0.7)';
        ctx.font       = '10px Courier New';
        ctx.textAlign  = 'right';
        ctx.fillText(speedStr, W - 10, 8);
      }
    }

    // ── Main render ───────────────────────────────────────────────
    function render() {
      // Background
      ctx.fillStyle = '#07111f';
      ctx.fillRect(0, 0, W, H);

      drawGrid();

      const lvl = LEVELS[currentLevel];

      // Level geometry (walls)
      for (const seg of lvl.walls) {
        drawSeg(seg, '#1e6ba8', 3);
      }

      // Spikes
      for (const spike of lvl.spikes) drawSpikes(spike);

      // Start pipe & basket
      drawStartPipe(lvl.startPipe);
      drawBasket(lvl.basket);

      // Player-placed objects
      for (const w of wells)    drawWell(w);
      for (const b of bouncers) drawBouncer(b);
      for (const p of planks)   drawPlank(p);

      // Placement preview
      drawPreview();

      // Particles (behind cat)
      drawParticles();

      // Cat (on top of everything)
      drawCat();

      // HUD overlay
      drawHUD();
    }

    // ── Game loop ─────────────────────────────────────────────────
    function loop() {
      updatePhysics();
      render();
      requestAnimationFrame(loop);
    }

    // ── Bootstrap ─────────────────────────────────────────────────
    function init() {
      resetLevel();
      selectTool('bouncer');
      loop();
    }

    init();
  </script>
</body>
</html>
