<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity Feline</title>
</head>
<body>
  <h1>Gravity Feline</h1>
  <div id="subtitle">A Physics Puzzle</div>
  <div id="level-display">LEVEL 1</div>
  <div id="status-bar">Place objects, then press PLAY</div>

  <div id="game-container">
    <canvas id="canvas" width="800" height="530"></canvas>
  </div>

  <div id="toolbar">
    <div class="tool-group">
      <span class="tool-label" id="count-bouncer">&times;3</span>
      <button id="btn-bouncer">&#8857; Bouncer</button>
    </div>
    <div class="tool-group">
      <span class="tool-label" id="count-well">&times;2</span>
      <button id="btn-well">&#8859; Gravity Well</button>
    </div>
    <div class="tool-group">
      <span class="tool-label" id="count-plank">&times;3</span>
      <button id="btn-plank">&#8212; Plank</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">&nbsp;</span>
      <button id="btn-remove">&#10005; Remove</button>
    </div>

    <div id="divider"></div>

    <div class="tool-group">
      <span class="tool-label">&nbsp;</span>
      <button id="btn-play">&#9654; Play</button>
    </div>
    <div class="tool-group">
      <span class="tool-label">&nbsp;</span>
      <button id="btn-reset">&#8634; Reset</button>
    </div>
  </div>

  <div id="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#ffd700;border:1px solid #ffaa00"></div>Cat
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:rgba(0,229,255,.3);border:1px solid #00e5ff"></div>Bouncer
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:rgba(180,79,255,.3);border:1px solid #b44fff"></div>Gravity Well
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="width:18px;height:4px;border-radius:2px;background:#78c878"></div>Plank
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:rgba(231,76,60,.4);border:1px solid #e74c3c"></div>Spike
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:rgba(255,215,0,.15);border:1px solid #ffd700"></div>Goal Basket
    </div>
  </div>

  <!--
    ═══════════════════════════════════════════════════════════════════
    VIRTUAL MODULE LOADER
    ───────────────────────────────────────────────────────────────────
    DEFS holds the source of each logical module as a plain string.
    The Loader at the bottom injects them into the DOM in dependency
    order so they share the same global scope without any bundler or
    external file loads.
    ═══════════════════════════════════════════════════════════════════
  -->
  <script>
  /* jshint esversion: 6 */
  const DEFS = {

    // ── styles.css ────────────────────────────────────────────────────
    styles: `
/* =============================================================

}

`,

    // ── levels.ts ─────────────────────────────────────────────────────
    levels: `
var LEVELS = [
  {
    // Level 1 - Easy intro
    startPipe: { x: 350, y: 0, w: 100, h: 60 },
    basket:    { x: 620, y: 450, w: 80, h: 50 },
    walls: [],
    spikes: [],
    inventory: { bouncer: 2, well: 1, plank: 2 },
    hint: 'Redirect the cat into the basket!'
  },
  {
    // Level 2 - Spikes
    startPipe: { x: 50, y: 0, w: 100, h: 60 },
    basket:    { x: 630, y: 440, w: 80, h: 50 },
    walls: [
      { x1: 200, y1: 0,   x2: 200, y2: 250 },
      { x1: 200, y1: 250, x2: 450, y2: 250 }
    ],
    spikes: [{ x: 200, y: 530, w: 250 }],
    inventory: { bouncer: 2, well: 2, plank: 2 },
    hint: 'Use planks to bridge over the spikes!'
  },
  {
    // Level 3 - Gravity wells
    startPipe: { x: 640, y: 0, w: 100, h: 60 },
    basket:    { x: 80, y: 420, w: 80, h: 50 },
    walls: [
      { x1: 380, y1: 0,   x2: 380, y2: 320 },
      { x1: 100, y1: 200, x2: 380, y2: 200 }
    ],
    spikes: [
      { x: 80,  y: 530, w: 180 },
      { x: 500, y: 530, w: 200 }
    ],
    inventory: { bouncer: 1, well: 3, plank: 2 },
    hint: 'Use gravity wells to pull the cat around obstacles!'
  },
  {
    // Level 4 - Hot floor
    startPipe: { x: 360, y: 0, w: 80, h: 60 },
    basket:    { x: 50, y: 200, w: 80, h: 55 },
    walls: [
      { x1: 0,   y1: 310, x2: 280, y2: 310 },
      { x1: 500, y1: 160, x2: 800, y2: 160 }
    ],
    spikes: [{ x: 0, y: 530, w: 800 }],
    inventory: { bouncer: 2, well: 1, plank: 3 },
    hint: "Don't touch the floor! Guide the cat to the left basket."
  }
];
`,

    // ── engine.ts ─────────────────────────────────────────────────────
    // Physics, renderer, audio, and screen-shake live here.
    // All exported identifiers use "var" so they become window properties
    // and are visible to the ui module that is injected afterwards.
    engine: `
// ── Canvas ────────────────────────────────────────────────────────
var canvas = document.getElementById('canvas');
var ctx    = canvas.getContext('2d');
var W      = canvas.width;
var H      = canvas.height;

// ── Constants ─────────────────────────────────────────────────────
var GRAVITY         = 0.38;
var AIR_DAMPING     = 0.995;
var WALL_RESTITUTION = 0.45;
var BOUNCER_IMPULSE = 14;
var WELL_STRENGTH   = 0.18;
var WELL_RADIUS     = 90;
// FIX: terminal-velocity cap prevents tunnelling through thin surfaces
var MAX_SPEED       = 18;
// Height of a spike triangle in pixels (must match renderer)
var SPIKE_HEIGHT    = 20;

// ── Audio (Web Audio API) ─────────────────────────────────────────
var _audioCtx = null;

function initAudio() {
  if (!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function _tone(type, f0, f1, dur, vol) {
  if (!_audioCtx) return;
  try {
    var osc  = _audioCtx.createOscillator();
    var gain = _audioCtx.createGain();
    osc.connect(gain);
    gain.connect(_audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(f0, _audioCtx.currentTime);
    if (f1 !== f0) {
      osc.frequency.exponentialRampToValueAtTime(f1, _audioCtx.currentTime + dur);
    }
    gain.gain.setValueAtTime(vol, _audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + dur);
    osc.start();
    osc.stop(_audioCtx.currentTime + dur);
  } catch (e) { /* audio errors are non-fatal */ }
}

function playPlaceSound() {
  _tone('sine',     900, 600, 0.07, 0.15);
}

function playBouncerSound() {
  _tone('square',   500, 250, 0.15, 0.20);
  setTimeout(function() { _tone('sine', 700, 400, 0.10, 0.15); }, 40);
}

function playWallBounceSound(speed) {
  // Pitch scales with impact speed so gentle taps sound quiet
  var f = 120 + Math.min(speed, 15) * 15;
  _tone('sine', f * 2, f, 0.12, 0.18);
}

function playDeathSound() {
  _tone('sawtooth', 400, 80, 0.45, 0.28);
}

function playWinSound() {
  var notes = [523, 659, 784, 1046];
  notes.forEach(function(freq, i) {
    setTimeout(function() { _tone('sine', freq, freq, 0.30, 0.28); }, i * 120);
  });
}

// ── Screen-shake ──────────────────────────────────────────────────
var shakeAmount = 0;
var shakeX      = 0;
var shakeY      = 0;

function addShake(amount) {
  shakeAmount = Math.max(shakeAmount, amount);
}

function updateShake() {
  if (shakeAmount > 0.5) {
    shakeX = (Math.random() - 0.5) * shakeAmount * 2;
    shakeY = (Math.random() - 0.5) * shakeAmount * 2;
    shakeAmount *= 0.78;
  } else {
    shakeAmount = 0;
    shakeX = 0;
    shakeY = 0;
  }
}

// ── Physics ───────────────────────────────────────────────────────

function circleSegmentCollision(cat, seg) {
  var dx    = seg.x2 - seg.x1;
  var dy    = seg.y2 - seg.y1;
  var lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return null;

  var t = Math.max(0, Math.min(1,
    ((cat.x - seg.x1) * dx + (cat.y - seg.y1) * dy) / lenSq));
  var cx = seg.x1 + t * dx;
  var cy = seg.y1 + t * dy;

  var distX = cat.x - cx;
  var distY = cat.y - cy;
  var dist  = Math.sqrt(distX * distX + distY * distY);

  if (dist >= cat.r || dist === 0) return null;
  return { nx: distX / dist, ny: distY / dist, overlap: cat.r - dist };
}

function circleBouncer(cat, bouncer) {
  var dx   = cat.x - bouncer.x;
  var dy   = cat.y - bouncer.y;
  var dist = Math.sqrt(dx * dx + dy * dy);
  var min  = cat.r + bouncer.r;
  if (dist >= min || dist === 0) return null;
  return { nx: dx / dist, ny: dy / dist, overlap: min - dist };
}

function resolveSegment(cat, result) {
  cat.x += result.nx * result.overlap;
  cat.y += result.ny * result.overlap;
  var dot = cat.vx * result.nx + cat.vy * result.ny;
  if (dot < 0) {
    cat.vx -= (1 + WALL_RESTITUTION) * dot * result.nx;
    cat.vy -= (1 + WALL_RESTITUTION) * dot * result.ny;
  }
}

function resolveBouncer(cat, result) {
  cat.x += result.nx * result.overlap;
  cat.y += result.ny * result.overlap;
  var dot = cat.vx * result.nx + cat.vy * result.ny;
  if (dot < 0) {
    cat.vx -= 2 * dot * result.nx;
    cat.vy -= 2 * dot * result.ny;
  }
  cat.vx += result.nx * BOUNCER_IMPULSE;
  cat.vy += result.ny * BOUNCER_IMPULSE;
}

function applyWells(cat, wells) {
  for (var i = 0; i < wells.length; i++) {
    var well = wells[i];
    var dx   = well.x - cat.x;
    var dy   = well.y - cat.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < WELL_RADIUS && dist > 0) {
      var force = WELL_STRENGTH * (1 - dist / WELL_RADIUS);
      cat.vx += force * dx / dist;
      cat.vy += force * dy / dist;
    }
  }
}

function stepCat(cat) {
  cat.vy += GRAVITY;
  cat.vx *= AIR_DAMPING;
  cat.vy *= AIR_DAMPING;
  // FIX: clamp speed to prevent tunnelling through thin walls/planks
  var speed = Math.sqrt(cat.vx * cat.vx + cat.vy * cat.vy);
  if (speed > MAX_SPEED) {
    var scale = MAX_SPEED / speed;
    cat.vx *= scale;
    cat.vy *= scale;
  }
  cat.x += cat.vx;
  cat.y += cat.vy;
}

// FIX: use cat radius for accurate circle-vs-spike-strip detection.
// Old code used a hard-coded 40 px vertical window which was both too
// tall (false positives above spike tips) and used the cat centre
// rather than its lowest edge.
function catOnSpike(cat, spikes) {
  for (var i = 0; i < spikes.length; i++) {
    var s = spikes[i];
    if (cat.x + cat.r > s.x &&
        cat.x - cat.r < s.x + s.w &&
        cat.y + cat.r > s.y - SPIKE_HEIGHT &&
        cat.y - cat.r < s.y) {
      return true;
    }
  }
  return false;
}

function catInBasket(cat, basket) {
  return (
    cat.x > basket.x + 10 &&
    cat.x < basket.x + basket.w - 10 &&
    cat.y > basket.y &&
    cat.y < basket.y + basket.h
  );
}

// Returns true when the cat falls off the bottom edge.
function resolveWalls(cat) {
  if (cat.x - cat.r < 0) {
    cat.x  = cat.r;
    cat.vx = Math.abs(cat.vx) * WALL_RESTITUTION;
  }
  if (cat.x + cat.r > W) {
    cat.x  = W - cat.r;
    cat.vx = -Math.abs(cat.vx) * WALL_RESTITUTION;
  }
  if (cat.y - cat.r < 0) {
    cat.y  = cat.r;
    cat.vy = Math.abs(cat.vy) * WALL_RESTITUTION;
  }
  return (cat.y - cat.r > H);
}

// ── Renderer ──────────────────────────────────────────────────────

function drawBackground() {
  ctx.fillStyle = '#07111f';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#0d1f35';
  ctx.lineWidth = 1;
  var g = 40;
  ctx.beginPath();
  for (var x = 0; x <= W; x += g) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
  for (var y = 0; y <= H; y += g) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
  ctx.stroke();
}

function drawWalls(walls) {
  ctx.strokeStyle = '#4a9fd4';
  ctx.lineWidth   = 3;
  ctx.lineCap     = 'round';
  for (var i = 0; i < walls.length; i++) {
    var s = walls[i];
    ctx.beginPath();
    ctx.moveTo(s.x1, s.y1);
    ctx.lineTo(s.x2, s.y2);
    ctx.stroke();
  }
}

function drawSpikes(spikes) {
  var tw = 20, th = SPIKE_HEIGHT;
  for (var i = 0; i < spikes.length; i++) {
    var sp = spikes[i];
    var n  = Math.floor(sp.w / tw);
    ctx.fillStyle   = '#e74c3c';
    ctx.strokeStyle = '#ff6b5a';
    ctx.lineWidth   = 1;
    for (var j = 0; j < n; j++) {
      var bx = sp.x + j * tw;
      ctx.beginPath();
      ctx.moveTo(bx,      sp.y);
      ctx.lineTo(bx + tw / 2, sp.y - th);
      ctx.lineTo(bx + tw, sp.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
  }
}

function drawStartPipe(pipe) {
  ctx.fillStyle   = '#1a3a5c';
  ctx.strokeStyle = '#4a7aa4';
  ctx.lineWidth   = 2;
  ctx.fillRect(pipe.x, pipe.y, pipe.w, pipe.h);
  ctx.beginPath();
  ctx.moveTo(pipe.x,          pipe.y + pipe.h);
  ctx.lineTo(pipe.x,          pipe.y);
  ctx.lineTo(pipe.x + pipe.w, pipe.y);
  ctx.lineTo(pipe.x + pipe.w, pipe.y + pipe.h);
  ctx.stroke();
}

function drawBasket(basket, phase) {
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth   = 2;
  if (phase === 'won') {
    ctx.fillStyle = 'rgba(255,215,0,0.3)';
    ctx.fillRect(basket.x, basket.y, basket.w, basket.h);
  }
  ctx.beginPath();
  ctx.moveTo(basket.x,            basket.y);
  ctx.lineTo(basket.x,            basket.y + basket.h);
  ctx.lineTo(basket.x + basket.w, basket.y + basket.h);
  ctx.lineTo(basket.x + basket.w, basket.y);
  ctx.stroke();
}

function drawBouncers(bouncers, now) {
  for (var i = 0; i < bouncers.length; i++) {
    var b = bouncers[i];
    // Pulsing glow driven by real time
    var pulse = (Math.sin(now / 350 + i * 1.3) + 1) * 0.5;
    ctx.save();
    ctx.shadowBlur  = 8 + pulse * 10;
    ctx.shadowColor = '#00e5ff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle   = 'rgba(0,229,255,' + (0.12 + pulse * 0.12) + ')';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,229,255,' + (0.7 + pulse * 0.3) + ')';
    ctx.lineWidth   = 2;
    ctx.stroke();
    ctx.restore();
  }
}

function drawWells(wells) {
  for (var i = 0; i < wells.length; i++) {
    var w = wells[i];
    ctx.beginPath();
    ctx.arc(w.x, w.y, 15, 0, Math.PI * 2);
    ctx.fillStyle   = '#b44fff';
    ctx.fill();
    ctx.strokeStyle = '#d080ff';
    ctx.lineWidth   = 1;
    ctx.stroke();
    // Influence ring (dashed)
    ctx.save();
    ctx.beginPath();
    ctx.arc(w.x, w.y, WELL_RADIUS, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(180,79,255,0.35)';
    ctx.lineWidth   = 1;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.restore();
  }
}

function drawPlanks(planks) {
  ctx.strokeStyle = '#78c878';
  ctx.lineWidth   = 5;
  ctx.lineCap     = 'round';
  for (var i = 0; i < planks.length; i++) {
    var p = planks[i];
    ctx.beginPath();
    ctx.moveTo(p.x1, p.y1);
    ctx.lineTo(p.x2, p.y2);
    ctx.stroke();
  }
}

function drawCat(cat) {
  var x = cat.x, y = cat.y, r = cat.r;
  ctx.save();
  ctx.shadowBlur  = 8;
  ctx.shadowColor = 'rgba(255,215,0,0.5)';
  // Body
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle   = '#ffd700';
  ctx.fill();
  ctx.strokeStyle = '#ffaa00';
  ctx.lineWidth   = 1.5;
  ctx.stroke();
  ctx.shadowBlur = 0;
  // Left ear
  ctx.beginPath();
  ctx.moveTo(x - r * 0.6, y - r * 0.7);
  ctx.lineTo(x - r * 0.9, y - r * 1.5);
  ctx.lineTo(x - r * 0.1, y - r * 1.0);
  ctx.closePath();
  ctx.fillStyle = '#ffd700'; ctx.fill();
  ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 1; ctx.stroke();
  // Right ear
  ctx.beginPath();
  ctx.moveTo(x + r * 0.6, y - r * 0.7);
  ctx.lineTo(x + r * 0.9, y - r * 1.5);
  ctx.lineTo(x + r * 0.1, y - r * 1.0);
  ctx.closePath();
  ctx.fillStyle = '#ffd700'; ctx.fill();
  ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 1; ctx.stroke();
  // Eyes
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.arc(x - r * 0.35, y - r * 0.1, r * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + r * 0.35, y - r * 0.1, r * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawParticles(particles) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  }
}

function drawPlankPreview(start, end) {
  ctx.save();
  ctx.strokeStyle = '#78c878';
  ctx.lineWidth   = 3;
  ctx.lineCap     = 'round';
  ctx.setLineDash([8, 5]);
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(start.x, start.y);
  ctx.lineTo(end.x, end.y);
  ctx.stroke();
  ctx.restore();
}

function drawOverlay(phase, levelIdx) {
  if (phase === 'building' || phase === 'playing') return;
  ctx.fillStyle = 'rgba(7,17,31,0.68)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  if (phase === 'won') {
    ctx.fillStyle = '#ffd700';
    ctx.font      = 'bold 56px monospace';
    ctx.fillText('YOU WIN! \uD83D\uDC31', W / 2, H / 2 - 30);
    ctx.fillStyle = '#aaddff';
    ctx.font      = '22px monospace';
    var last = levelIdx >= LEVELS.length - 1;
    ctx.fillText(last ? 'Click to play again!' : 'Click to continue \u2192', W / 2, H / 2 + 30);
  } else if (phase === 'dead') {
    ctx.fillStyle = '#e74c3c';
    ctx.font      = 'bold 56px monospace';
    ctx.fillText('OH NO! \uD83D\uDC31', W / 2, H / 2 - 30);
    ctx.fillStyle = '#aaddff';
    ctx.font      = '22px monospace';
    ctx.fillText('Click to retry', W / 2, H / 2 + 30);

    // ── ui.ts ─────────────────────────────────────────────────────────

    ui: `
// ── State ─────────────────────────────────────────────────────────
var currentLevel  = 0;
var phase         = 'building';
var activeTool    = null;

var placedBouncers = [];
var placedWells    = [];
var placedPlanks   = [];

var plankStart = null;
var mousePos   = { x: 0, y: 0 };

var cat       = { x: 0, y: 0, vx: 0, vy: 0, r: 14 };
var particles = [];
var catTrail  = [];   // last N positions for the motion trail
var inventory = { bouncer: 0, well: 0, plank: 0 };

// ── DOM helpers ────────────────────────────────────────────────────
function el(id)  { return document.getElementById(id); }
function btn(id) { return document.getElementById(id); }

// ── Inventory / tool UI ────────────────────────────────────────────
function updateCounts() {
  el('count-bouncer').textContent = '\u00d7' + inventory.bouncer;
  el('count-well').textContent    = '\u00d7' + inventory.well;
  el('count-plank').textContent   = '\u00d7' + inventory.plank;
  btn('btn-bouncer').disabled = inventory.bouncer === 0;
  btn('btn-well').disabled    = inventory.well    === 0;
  btn('btn-plank').disabled   = inventory.plank   === 0;
}

function selectTool(tool) {
  ['btn-bouncer', 'btn-well', 'btn-plank', 'btn-remove'].forEach(function(id) {
    btn(id).classList.remove('active');
  });
  if (tool !== null) {
    var map = { bouncer: 'btn-bouncer', well: 'btn-well',
                plank: 'btn-plank',     remove: 'btn-remove' };
    btn(map[tool]).classList.add('active');
  }
  plankStart = null;
  activeTool = tool;
}

// ── Particle helpers ───────────────────────────────────────────────
function spawnParticles(x, y, color, count, minSize, maxSize) {
  count   = count   || 8;
  minSize = minSize || 2;
  maxSize = maxSize || 4;
  for (var i = 0; i < count; i++) {
    var angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    var speed = 2 + Math.random() * 4;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,   // slight upward bias
      life: 1, maxLife: 1,
      color: color,
      size: minSize + Math.random() * (maxSize - minSize)
    });
  }
}

// ── Level loader ───────────────────────────────────────────────────
function loadLevel(idx) {
  currentLevel = idx;
  phase        = 'building';
  activeTool   = null;

  var level = LEVELS[idx];
  inventory = { bouncer: level.inventory.bouncer,
                well:    level.inventory.well,
                plank:   level.inventory.plank };

  placedBouncers = [];
  placedWells    = [];
  placedPlanks   = [];
  plankStart     = null;
  particles      = [];
  catTrail       = [];
  shakeAmount    = 0;

  var pipe = level.startPipe;
  cat = { x: pipe.x + pipe.w / 2, y: pipe.y + pipe.h + 14,
          vx: 0, vy: 0, r: 14 };

  el('level-display').textContent = 'LEVEL ' + (idx + 1);
  el('status-bar').textContent    = level.hint;

  updateCounts();
  selectTool(null);

  btn('btn-play').disabled   = false;
  btn('btn-reset').disabled  = false;
  btn('btn-bouncer').disabled = inventory.bouncer === 0;
  btn('btn-well').disabled    = inventory.well    === 0;
  btn('btn-plank').disabled   = inventory.plank   === 0;
  btn('btn-remove').disabled  = false;
}

// ── Update ─────────────────────────────────────────────────────────
function update() {
  // Animate particles even while building / on overlays
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.12;   // particles fall under gravity
    p.vx *= 0.97;
    p.life -= 0.022;
  }
  particles = particles.filter(function(p) { return p.life > 0; });

  updateShake();

  if (phase !== 'playing') return;

  var level = LEVELS[currentLevel];

  applyWells(cat, placedWells);
  stepCat(cat);

  // FIX: run 2 collision-resolution iterations for stability at corners
  for (var iter = 0; iter < 2; iter++) {
    for (var i = 0; i < level.walls.length; i++) {
      var r = circleSegmentCollision(cat, level.walls[i]);
      if (r) resolveSegment(cat, r);
    }
    for (var i = 0; i < placedPlanks.length; i++) {
      var r = circleSegmentCollision(cat, placedPlanks[i]);
      if (r) resolveSegment(cat, r);
    }
  }

  for (var i = 0; i < placedBouncers.length; i++) {
    var bouncer = placedBouncers[i];
    var r = circleBouncer(cat, bouncer);
    if (r) {
      resolveBouncer(cat, r);
      spawnParticles(bouncer.x, bouncer.y, '#00e5ff', 10, 2, 5);
      addShake(6);
      playBouncerSound();
    }
  }

  var speed = Math.sqrt(cat.vx * cat.vx + cat.vy * cat.vy);
  var fellOff = resolveWalls(cat);
  if (fellOff) {
    phase = 'dead';
    spawnParticles(cat.x, H - 20, '#e74c3c', 18, 3, 6);
    addShake(14);
    playDeathSound();
    el('status-bar').textContent = '\uD83D\uDC80 Oh no! Click to retry\u2026';
    btn('btn-play').disabled = true;
    return;
  }

  if (catOnSpike(cat, level.spikes)) {
    phase = 'dead';
    spawnParticles(cat.x, cat.y, '#e74c3c', 18, 3, 6);
    addShake(14);
    playDeathSound();
    el('status-bar').textContent = '\uD83D\uDC80 Oh no! Click to retry\u2026';
    btn('btn-play').disabled = true;
    return;
  }

  if (catInBasket(cat, level.basket)) {
    phase = 'won';
    spawnParticles(cat.x, cat.y, '#ffd700', 22, 3, 7);
    spawnParticles(cat.x, cat.y, '#00e5ff', 14, 2, 4);
    playWinSound();
    el('status-bar').textContent = '\uD83D\uDC31 You got in! Click to continue\u2026';
    btn('btn-play').disabled = true;
    return;
  }

  // Motion trail: keep the last 8 positions while playing
  catTrail.push({ x: cat.x, y: cat.y });
  if (catTrail.length > 8) catTrail.shift();
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  var level = LEVELS[currentLevel];
  var now   = performance.now();

  // Background is drawn before the shake transform so it always fills
  // the whole canvas without edge artefacts.
  drawBackground();

  // Apply screen-shake to all game-world elements
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawWalls(level.walls);
  drawSpikes(level.spikes);
  drawStartPipe(level.startPipe);
  drawBasket(level.basket, phase);
  drawPlanks(placedPlanks);
  drawBouncers(placedBouncers, now);
  drawWells(placedWells);

  // Motion trail (drawn before the cat so it appears behind it)
  if (catTrail.length > 1) {
    for (var i = 0; i < catTrail.length; i++) {
      var tp = catTrail[i];
      var ta = (i + 1) / catTrail.length * 0.28;
      ctx.save();
      ctx.globalAlpha = ta;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, cat.r * 0.55, 0, Math.PI * 2);
      ctx.fillStyle = '#ffd700';
      ctx.fill();
      ctx.restore();
    }
  }

  drawCat(cat);
  drawParticles(particles);

  if (phase === 'building' && activeTool === 'plank' && plankStart !== null) {
    drawPlankPreview(plankStart, mousePos);
  }

  ctx.restore();   // remove shake transform before overlay

  // Overlay is always drawn steady (no shake)
  drawOverlay(phase, currentLevel);
}

// ── Event handlers ─────────────────────────────────────────────────
canvas.addEventListener('click', function(e) {
  initAudio();
  var rect = canvas.getBoundingClientRect();
  var x = (e.clientX - rect.left) * (W / rect.width);
  var y = (e.clientY - rect.top)  * (H / rect.height);

  if (phase === 'won') {
    loadLevel(currentLevel + 1 < LEVELS.length ? currentLevel + 1 : 0);
    return;
  }
  if (phase === 'dead') { loadLevel(currentLevel); return; }
  if (phase !== 'building') return;

  if (activeTool === 'bouncer' && inventory.bouncer > 0) {
    placedBouncers.push({ x: x, y: y, r: 22 });
    inventory.bouncer--;
    playPlaceSound();
    updateCounts();
    if (inventory.bouncer === 0) selectTool(null);

  } else if (activeTool === 'well' && inventory.well > 0) {
    placedWells.push({ x: x, y: y });
    inventory.well--;
    playPlaceSound();
    updateCounts();
    if (inventory.well === 0) selectTool(null);

  } else if (activeTool === 'plank' && inventory.plank > 0) {
    if (plankStart === null) {
      plankStart = { x: x, y: y };
      playPlaceSound();
    } else {
      placedPlanks.push({ x1: plankStart.x, y1: plankStart.y, x2: x, y2: y });
      inventory.plank--;
      plankStart = null;
      playPlaceSound();
      updateCounts();
      if (inventory.plank === 0) selectTool(null);
    }

  } else if (activeTool === 'remove') {
    var removed = false;

    for (var i = 0; i < placedBouncers.length && !removed; i++) {
      var b = placedBouncers[i];
      if (Math.hypot(b.x - x, b.y - y) < 30) {
        placedBouncers.splice(i, 1);
        inventory.bouncer++;
        updateCounts();
        removed = true;
      }
    }

    for (var i = 0; i < placedWells.length && !removed; i++) {
      var w = placedWells[i];
      if (Math.hypot(w.x - x, w.y - y) < 30) {
        placedWells.splice(i, 1);
        inventory.well++;
        updateCounts();
        removed = true;
      }
    }

    for (var i = 0; i < placedPlanks.length && !removed; i++) {
      var p = placedPlanks[i];
      if (Math.hypot((p.x1 + p.x2) / 2 - x, (p.y1 + p.y2) / 2 - y) < 40) {
        placedPlanks.splice(i, 1);
        inventory.plank++;
        updateCounts();
        removed = true;
      }
    }
  }
});

canvas.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  mousePos.x = (e.clientX - rect.left) * (W / rect.width);
  mousePos.y = (e.clientY - rect.top)  * (H / rect.height);
});

btn('btn-bouncer').addEventListener('click', function() { initAudio(); selectTool('bouncer'); });
btn('btn-well').addEventListener('click',    function() { initAudio(); selectTool('well');    });
btn('btn-plank').addEventListener('click',   function() { initAudio(); selectTool('plank');   });
btn('btn-remove').addEventListener('click',  function() { initAudio(); selectTool('remove');  });

btn('btn-play').addEventListener('click', function() {
  initAudio();
  if (phase === 'building') {
    phase = 'playing';
    catTrail = [];
    el('status-bar').textContent = 'PLAYING\u2026';
    btn('btn-play').disabled   = true;
    btn('btn-bouncer').disabled = true;
    btn('btn-well').disabled    = true;
    btn('btn-plank').disabled   = true;
    btn('btn-remove').disabled  = true;
  }
});

btn('btn-reset').addEventListener('click', function() {
  initAudio();
  loadLevel(currentLevel);
});

// ── Game loop ──────────────────────────────────────────────────────
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loadLevel(0);
requestAnimationFrame(loop);
`

  }; // end DEFS

  // ═══════════════════════════════════════════════════════════════════
  // LOADER
  // Injects the virtual modules into the live DOM in dependency order:
  //   levels  →  engine  →  ui
  // ═══════════════════════════════════════════════════════════════════
  (function loader() {
    // 1. Inject styles
    const styleEl = document.createElement('style');
    styleEl.textContent = DEFS.styles;
    document.head.appendChild(styleEl);

    // 2. Inject script modules in order
    ['levels', 'engine', 'ui'].forEach(function(name) {
      const scriptEl = document.createElement('script');
      scriptEl.textContent = DEFS[name];
      document.body.appendChild(scriptEl);
    });
  })();
  </script>
